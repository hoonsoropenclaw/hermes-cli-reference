<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hermes Agent 指令大全</title>
<meta name="description" content="Hermes Agent 在 PowerShell/CMD 視窗下的 CLI 指令 + 在對話中使用的 /slash 指令,合在一站。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0d10;
    --bg-elev: #11151a;
    --bg-elev-2: #161b21;
    --line: #1f262d;
    --line-strong: #2a333c;
    --text: #e6edf3;
    --text-dim: #9aa6b2;
    --text-mute: #6b7785;
    --accent: #4ade80;          /* CLI - 終端機綠 */
    --accent-dim: #22c55e;
    --chat-accent: #60a5fa;     /* Chat - 對話藍 */
    --chat-accent-dim: #3b82f6;
    --warn: #f59e0b;
    --tag-bg: #18232c;
    --tag-text: #b6c3cf;
    --shadow: 0 1px 0 rgba(255,255,255,.02) inset, 0 8px 30px rgba(0,0,0,.35);
    --radius: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf7;
      --bg-elev: #ffffff;
      --bg-elev-2: #f3f3ee;
      --line: #e6e6df;
      --line-strong: #d6d6cf;
      --text: #14181c;
      --text-dim: #4a525b;
      --text-mute: #7a8089;
      --accent: #15803d;
      --accent-dim: #166534;
      --chat-accent: #1d4ed8;
      --chat-accent-dim: #1e40af;
      --tag-bg: #eef0eb;
      --tag-text: #3a4148;
      --shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 6px 24px rgba(20,24,28,.06);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter Tight", system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; }
  code, .cmd-syntax, .slash { font-family: "JetBrains Mono", ui-monospace, "Cascadia Code", "Consolas", monospace; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-dot { width: 9px; height: 9px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
  .brand small { color: var(--text-mute); font-weight: 500; margin-left: 4px; }
  .topnav { display: flex; gap: 4px; align-items: center; font-size: 13px; }
  .topnav a { color: var(--text-dim); text-decoration: none; padding: 6px 10px; border-radius: 6px; }
  .topnav a:hover { color: var(--text); background: var(--bg-elev); }
  .topnav .gh { margin-left: 8px; border: 1px solid var(--line-strong); padding: 6px 12px; font-weight: 500; }

  /* Hero */
  .hero { padding: 56px 0 32px; border-bottom: 1px solid var(--line); }
  .eyebrow {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
  }
  h1 {
    font-size: clamp(30px, 4.2vw, 44px);
    font-weight: 700; letter-spacing: -0.025em; line-height: 1.1;
    margin: 0 0 16px;
  }
  h1 .accent-cli { color: var(--accent); }
  h1 .accent-chat { color: var(--chat-accent); }
  .lede { font-size: 16px; color: var(--text-dim); max-width: 720px; margin: 0 0 24px; }
  .meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 12px; color: var(--text-mute);
  }
  .meta span { padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px; }

  /* 大 tab 切換 */
  .mode-switcher {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--line);
    background: var(--bg);
    position: sticky; top: 60px; z-index: 40;
  }
  .mode-tab {
    flex: 1; padding: 18px 24px;
    background: transparent; border: none;
    color: var(--text-dim);
    font-size: 15px; font-weight: 600;
    cursor: pointer;
    text-align: left;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
    font-family: inherit;
  }
  .mode-tab:hover { color: var(--text); background: var(--bg-elev); }
  .mode-tab.active { color: var(--text); }
  .mode-tab[data-mode="cli"].active { border-bottom-color: var(--accent); }
  .mode-tab[data-mode="chat"].active { border-bottom-color: var(--chat-accent); }
  .mode-tab .mode-label { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .mode-tab .mode-icon {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 14px;
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg-elev-2);
    border: 1px solid var(--line);
  }
  .mode-tab[data-mode="cli"] .mode-icon { color: var(--accent); }
  .mode-tab[data-mode="chat"] .mode-icon { color: var(--chat-accent); }
  .mode-tab .mode-desc { font-size: 12px; color: var(--text-mute); font-weight: 400; }

  /* Search + filter */
  .search-section { padding: 24px 0; border-bottom: 1px solid var(--line); background: var(--bg); position: sticky; top: 122px; z-index: 39; }
  .search-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 240px;
    padding: 11px 16px;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text); font-size: 14px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    outline: none; transition: border-color 0.15s;
  }
  .cli-mode .search-input:focus { border-color: var(--accent); }
  .chat-mode .search-input:focus { border-color: var(--chat-accent); }
  .search-input::placeholder { color: var(--text-mute); }
  .cat-filter { display: flex; gap: 4px; flex-wrap: wrap; }
  .cat-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--text-dim); padding: 7px 12px;
    border-radius: 7px; cursor: pointer; font-size: 12px;
    font-weight: 500; transition: all 0.15s;
    font-family: inherit;
  }
  .cat-btn:hover { color: var(--text); border-color: var(--line-strong); }
  .cat-btn.active { color: var(--bg-elev); border-color: transparent; }
  .cli-mode .cat-btn.active { background: var(--accent); }
  .chat-mode .cat-btn.active { background: var(--chat-accent); color: white; }

  /* Section */
  .section { padding: 40px 0; border-bottom: 1px solid var(--line); }
  .section:last-of-type { border-bottom: none; }
  .section-title {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-mute); margin-bottom: 20px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }
  .cli-mode .section-title { color: var(--accent); }
  .chat-mode .section-title { color: var(--chat-accent); }

  /* Command card (CLI) */
  .cmd-block {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 14px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cmd-head {
    padding: 14px 20px;
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .cmd-name {
    font-size: 16px; font-weight: 600;
    color: var(--accent);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  .chat-mode .cmd-name { color: var(--chat-accent); }
  .cmd-desc { font-size: 13px; color: var(--text-dim); }
  .cmd-list { padding: 6px 0; }
  .cmd-row {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 11px 20px;
    border-bottom: 1px solid var(--line);
    transition: background 0.1s;
  }
  .cmd-row:last-child { border-bottom: none; }
  .cmd-row:hover { background: var(--bg-elev-2); }
  .cmd-syntax {
    flex-shrink: 0;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px; color: var(--text);
    background: var(--bg);
    padding: 6px 10px; border-radius: 5px;
    border: 1px solid var(--line);
    min-width: 280px;
    cursor: pointer;
    user-select: all;
  }
  .cli-mode .cmd-syntax::before { content: '$ '; color: var(--accent); }
  .chat-mode .cmd-syntax { color: var(--chat-accent); }
  .cmd-explain { flex: 1; font-size: 14px; color: var(--text-dim); }
  .copy-btn {
    flex-shrink: 0;
    background: transparent; border: 1px solid var(--line);
    color: var(--text-mute);
    padding: 4px 10px; border-radius: 5px;
    font-size: 12px; cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
  }
  .cli-mode .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .chat-mode .copy-btn:hover { color: var(--chat-accent); border-color: var(--chat-accent); }

  /* Slash command card (Chat) */
  .slash-block {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-left: 3px solid var(--chat-accent);
    border-radius: var(--radius);
    margin-bottom: 12px;
    padding: 14px 18px;
    box-shadow: var(--shadow);
  }
  .slash-head {
    display: flex; align-items: baseline; gap: 12px;
    margin-bottom: 6px; flex-wrap: wrap;
  }
  .slash-name {
    font-size: 16px; font-weight: 600;
    color: var(--chat-accent);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  .slash-alias {
    font-size: 12px; color: var(--text-mute);
    background: var(--bg-elev-2);
    padding: 2px 8px; border-radius: 4px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  .slash-desc { font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .slash-scenario { font-size: 13px; color: var(--text-mute); font-style: italic; }
  .slash-scenario::before { content: '💡 '; }
  .copy-slash {
    margin-left: auto;
    background: transparent; border: 1px solid var(--line);
    color: var(--text-mute);
    padding: 3px 9px; border-radius: 5px;
    font-size: 11px; cursor: pointer;
    font-family: inherit;
    transition: all 0.1s;
  }
  .copy-slash:hover { color: var(--chat-accent); border-color: var(--chat-accent); }

  /* Empty */
  .empty { padding: 60px 20px; text-align: center; color: var(--text-mute); }
  .empty h3 { margin: 0 0 8px; color: var(--text-dim); font-weight: 600; }

  /* Footer */
  .foot { padding: 40px 0; color: var(--text-mute); font-size: 13px; }
  .foot-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .foot a { color: var(--text-dim); text-decoration: none; border-bottom: 1px dotted var(--line-strong); }
  .foot a:hover { color: var(--accent); }

  /* Mode visibility */
  .mode-panel { display: none; }
  body.cli-mode .mode-panel[data-mode="cli"] { display: block; }
  body.chat-mode .mode-panel[data-mode="chat"] { display: block; }
  body.cli-mode .filter-row[data-mode="chat"] { display: none; }
  body.chat-mode .filter-row[data-mode="cli"] { display: none; }

  @media (max-width: 720px) {
    .cmd-row { flex-direction: column; gap: 8px; }
    .cmd-syntax { min-width: 0; width: 100%; }
    .mode-tab { padding: 14px 16px; font-size: 13px; }
  }
</style>
</head>
<body class="cli-mode">

<header class="topbar">
  <div class="wrap topbar-inner">
    <div class="brand">
      <span class="brand-dot"></span>
      Hermes 指令大全 <small>// CLI + In-Chat</small>
    </div>
    <nav class="topnav">
      <a href="#how-it-works">怎麼用</a>
      <a href="https://hermes-agent.nousresearch.com/docs" target="_blank" rel="noopener">官方文件 ↗</a>
    </nav>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <div class="eyebrow" id="hero-eyebrow">$ hermes --help</div>
    <h1>
      <span class="accent-cli" id="hero-h1-cli">Hermes Agent <span class="accent-cli">CLI</span> + In-Chat <span class="accent-chat">Slash</span> 指令大全</span>
    </h1>
    <p class="lede">
      兩種指令合在一站,各自有專屬的視窗。點擊指令可複製。
    </p>
    <div class="meta">
      <span><span id="cli-count">29</span> 個 CLI 指令 (PowerShell/CMD 視窗)</span>
      <span><span id="chat-count">63</span> 個 Slash 指令 (對話中輸入)</span>
      <span>Windows / macOS / Linux 通用</span>
      <span>最後更新: 2026-06-06</span>
    </div>
  </div>
</section>

<!-- 大 tab 切換 -->
<div class="mode-switcher" id="mode-switcher">
  <button class="mode-tab active" data-mode="cli" onclick="setMode('cli')">
    <div class="mode-label">
      <span class="mode-icon">$</span>
      <span>CLI 指令 <span style="color:var(--text-mute);font-weight:400;font-size:13px">(在 PowerShell/CMD 視窗下輸入)</span></span>
    </div>
    <div class="mode-desc">hermes chat, hermes setup, hermes cron, hermes backup ...</div>
  </button>
  <button class="mode-tab" data-mode="chat" onclick="setMode('chat')">
    <div class="mode-label">
      <span class="mode-icon">/</span>
      <span>Slash 指令 <span style="color:var(--text-mute);font-weight:400;font-size:13px">(在跟 Hermes 對話時輸入)</span></span>
    </div>
    <div class="mode-desc">/new, /compress, /model, /skills, /approve ...</div>
  </button>
</div>

<section class="search-section">
  <div class="wrap">
    <div class="search-row">
      <input id="search" class="search-input" type="search" placeholder="搜尋..." autocomplete="off" />
      <div class="cat-filter filter-row" data-mode="cli" id="cli-cats"></div>
      <div class="cat-filter filter-row" data-mode="chat" id="chat-cats"></div>
    </div>
  </div>
</section>

<!-- ==================== CLI 面板 ==================== -->
<div class="mode-panel" data-mode="cli">
  <div id="cli-content"></div>
</div>

<!-- ==================== CHAT 面板 ==================== -->
<div class="mode-panel" data-mode="chat">
  <div id="chat-content"></div>
</div>

<footer class="foot">
  <div class="wrap foot-inner">
    <div>Hermes Agent Reference · 2026</div>
    <div>
      <a href="https://hermes-agent.nousresearch.com/docs" target="_blank" rel="noopener">官方文件 ↗</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/hoonsoropenclaw" target="_blank" rel="noopener">Luke0415 ↗</a>
    </div>
  </div>
</footer>

<script src="js/commands.js"></script>
<script src="js/chat-commands.js"></script>
<script>
(function() {
  // ====== Mode 切換 ======
  let currentMode = 'cli';

  window.setMode = function(mode) {
    currentMode = mode;
    document.body.className = mode + '-mode';
    document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
    // 重設搜尋
    document.getElementById('search').value = '';
    // 重置分類
    currentCat = 'all';
    if (mode === 'cli') {
      buildCliFilter();
      renderCli();
      document.getElementById('search').placeholder = '搜尋 CLI 指令 (例如: cron, model, backup)...';
    } else {
      buildChatFilter();
      renderChat();
      document.getElementById('search').placeholder = '搜尋 Slash 指令 (例如: /new, /model, /skills)...';
    }
  };

  // ====== CLI 渲染 ======
  const CLI_CATEGORY = {
    'chat': 'essential', 'setup': 'essential', 'version': 'essential',
    'status': 'diagnostics', 'doctor': 'diagnostics', 'logs': 'diagnostics', 'dump': 'diagnostics',
    'model': 'model', 'login': 'model', 'logout': 'model', 'auth': 'model', 'fallback': 'model',
    'cron': 'automation', 'webhook': 'automation', 'send': 'channels',
    'memory': 'data', 'skills': 'data', 'config': 'data', 'backup': 'data', 'import': 'data',
    'dashboard': 'diagnostics', 'insights': 'data', 'security': 'data',
    'kanban': 'collab', 'portal': 'collab', 'pairing': 'collab',
    'curator': 'advanced', 'bundles': 'advanced', 'plugins': 'advanced',
  };
  const CLI_CAT_LABEL = {
    'essential': '🚀 基本啟動與設定',
    'diagnostics': '🔍 狀態與診斷',
    'model': '🧠 模型與登入',
    'automation': '⏰ 排程與自動化',
    'data': '💾 資料、技能、備份',
    'channels': '📡 訊息通道',
    'collab': '👥 協作工具',
    'advanced': '⚙️ 進階',
  };
  const CLI_CAT_ORDER = ['essential', 'diagnostics', 'model', 'automation', 'data', 'channels', 'collab', 'advanced'];

  let currentCat = 'all';

  function buildCliFilter() {
    const el = document.getElementById('cli-cats');
    el.innerHTML = '<button class="cat-btn active" data-cat="all">全部</button>' +
      CLI_CAT_ORDER.map(c => `<button class="cat-btn" data-cat="${c}">${CLI_CAT_LABEL[c]}</button>`).join('');
    el.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        el.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderCli();
      });
    });
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function renderCli() {
    const query = (document.getElementById('search').value || '').toLowerCase().trim();
    const el = document.getElementById('cli-content');
    let html = '';
    for (const cat of CLI_CAT_ORDER) {
      const cmds = Object.keys(COMMANDS).filter(c => CLI_CATEGORY[c] === cat);
      const matched = cmds.filter(c => {
        if (currentCat !== 'all' && CLI_CATEGORY[c] !== currentCat) return false;
        if (!query) return true;
        const data = COMMANDS[c];
        if (c.toLowerCase().includes(query)) return true;
        if (data.desc.toLowerCase().includes(query)) return true;
        return data.subs.some(s => s[0].toLowerCase().includes(query) || s[1].toLowerCase().includes(query));
      });
      if (matched.length === 0) continue;
      html += `<section class="section" id="cli-cat-${cat}"><div class="wrap">`;
      html += `<div class="section-title">${CLI_CAT_LABEL[cat]}</div>`;
      for (const cmd of matched) {
        const data = COMMANDS[cmd];
        html += `<div class="cmd-block">`;
        html += `<div class="cmd-head"><div><span class="cmd-name">hermes ${escapeHtml(cmd)}</span> <span class="cmd-desc">— ${escapeHtml(data.desc)}</span></div></div>`;
        html += `<div class="cmd-list">`;
        for (const [syntax, explain] of data.subs) {
          html += `<div class="cmd-row">`;
          html += `<code class="cmd-syntax" data-syntax="${escapeHtml(syntax)}" title="點擊複製">${escapeHtml(syntax)}</code>`;
          html += `<div class="cmd-explain">${escapeHtml(explain)}</div>`;
          html += `<button class="copy-btn" data-syntax="${escapeHtml(syntax)}">copy</button>`;
          html += `</div>`;
        }
        html += `</div></div>`;
      }
      html += `</div></section>`;
    }
    if (!html) html = `<div class="wrap"><div class="empty"><h3>找不到符合的指令</h3><p>試試別的關鍵字</p></div></div>`;
    el.innerHTML = html;
    bindCopy('cmd-syntax, .copy-btn', 'copy');
  }

  // ====== Chat 渲染 ======
  const CHAT_CAT_ORDER = ['session', 'gateway', 'utility', 'cli', 'config', 'tools_skills', 'info', 'background', 'agents', 'cron', 'curator', 'kanban', 'plugins', 'goal', 'exit'];

  function buildChatFilter() {
    const el = document.getElementById('chat-cats');
    el.innerHTML = '<button class="cat-btn active" data-cat="all">全部</button>' +
      CHAT_CAT_ORDER.map(c => `<button class="cat-btn" data-cat="${c}">${escapeHtml(CHAT_CATEGORIES[c] || c)}</button>`).join('');
    el.querySelectorAll('.cat-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        el.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        renderChat();
      });
    });
  }

  function renderChat() {
    const query = (document.getElementById('search').value || '').toLowerCase().trim();
    const el = document.getElementById('chat-content');
    let html = '';
    const cats = currentCat === 'all' ? CHAT_CAT_ORDER : [currentCat];
    for (const cat of cats) {
      const matched = CHAT_COMMANDS.filter(c => {
        if (c.cat !== cat) return false;
        if (!query) return true;
        if (c.name.toLowerCase().includes(query)) return true;
        if (c.alias && c.alias.toLowerCase().includes(query)) return true;
        if (c.desc.toLowerCase().includes(query)) return true;
        if (c.scenario.toLowerCase().includes(query)) return true;
        return false;
      });
      if (matched.length === 0) continue;
      html += `<section class="section" id="chat-cat-${cat}"><div class="wrap">`;
      html += `<div class="section-title">${escapeHtml(CHAT_CATEGORIES[cat] || cat)}</div>`;
      for (const c of matched) {
        html += `<div class="slash-block">`;
        html += `<div class="slash-head">`;
        html += `<span class="slash-name">${escapeHtml(c.name)}</span>`;
        if (c.alias) html += `<span class="slash-alias">別名: ${escapeHtml(c.alias)}</span>`;
        html += `<button class="copy-slash" data-syntax="${escapeHtml(c.name)}">copy</button>`;
        html += `</div>`;
        html += `<div class="slash-desc">${escapeHtml(c.desc)}</div>`;
        if (c.scenario) html += `<div class="slash-scenario">${escapeHtml(c.scenario)}</div>`;
        html += `</div>`;
      }
      html += `</div></section>`;
    }
    if (!html) html = `<div class="wrap"><div class="empty"><h3>找不到符合的指令</h3><p>試試別的關鍵字</p></div></div>`;
    el.innerHTML = html;
    bindCopy('.copy-slash, .slash-name', 'copy');
  }

  // ====== 共用 copy ======
  function bindCopy(selector, label) {
    document.querySelectorAll(selector).forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const syntax = el.getAttribute('data-syntax');
        if (!syntax) return;
        try {
          await navigator.clipboard.writeText(syntax);
        } catch (err) {
          const ta = document.createElement('textarea');
          ta.value = syntax;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        if (el.tagName === 'BUTTON') {
          const orig = el.textContent;
          el.textContent = '✓';
          setTimeout(() => el.textContent = orig, 1000);
        }
      });
    });
  }

  // ====== Search ======
  document.getElementById('search').addEventListener('input', () => {
    if (currentMode === 'cli') renderCli();
    else renderChat();
  });

  // ====== Boot ======
  buildCliFilter();
  renderCli();
  document.getElementById('search').placeholder = '搜尋 CLI 指令 (例如: cron, model, backup)...';
})();
</script>
</body>
</html>
