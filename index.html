<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hermes Agent CLI 指令大全</title>
<meta name="description" content="Hermes Agent 在 PowerShell / CMD 視窗下的常用 CLI 指令,涵蓋 80%~90% 使用情境。" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0d10;
    --bg-elev: #11151a;
    --bg-elev-2: #161b21;
    --line: #1f262d;
    --line-strong: #2a333c;
    --text: #e6edf3;
    --text-dim: #9aa6b2;
    --text-mute: #6b7785;
    --accent: #4ade80;
    --accent-dim: #22c55e;
    --warn: #f59e0b;
    --tag-bg: #18232c;
    --tag-text: #b6c3cf;
    --shadow: 0 1px 0 rgba(255,255,255,.02) inset, 0 8px 30px rgba(0,0,0,.35);
    --radius: 10px;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #fafaf7;
      --bg-elev: #ffffff;
      --bg-elev-2: #f3f3ee;
      --line: #e6e6df;
      --line-strong: #d6d6cf;
      --text: #14181c;
      --text-dim: #4a525b;
      --text-mute: #7a8089;
      --accent: #15803d;
      --accent-dim: #166534;
      --tag-bg: #eef0eb;
      --tag-text: #3a4148;
      --shadow: 0 1px 0 rgba(255,255,255,.6) inset, 0 6px 24px rgba(20,24,28,.06);
    }
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: "Inter Tight", system-ui, -apple-system, "Segoe UI", sans-serif;
    font-size: 15px;
    line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  a { color: inherit; }
  code, .cmd { font-family: "JetBrains Mono", ui-monospace, "Cascadia Code", "Consolas", monospace; }

  .wrap { max-width: 1180px; margin: 0 auto; padding: 0 28px; }

  /* Top bar */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    background: color-mix(in srgb, var(--bg) 78%, transparent);
    border-bottom: 1px solid var(--line);
  }
  .topbar-inner { display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; letter-spacing: -0.01em; }
  .brand-dot { width: 9px; height: 9px; border-radius: 999px; background: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 25%, transparent); }
  .brand small { color: var(--text-mute); font-weight: 500; margin-left: 4px; }
  .topnav { display: flex; gap: 4px; align-items: center; font-size: 13px; }
  .topnav a { color: var(--text-dim); text-decoration: none; padding: 6px 10px; border-radius: 6px; }
  .topnav a:hover { color: var(--text); background: var(--bg-elev); }
  .topnav .gh { margin-left: 8px; border: 1px solid var(--line-strong); padding: 6px 12px; font-weight: 500; }

  /* Hero */
  .hero { padding: 64px 0 36px; border-bottom: 1px solid var(--line); }
  .eyebrow {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--accent); margin-bottom: 18px;
  }
  h1 {
    font-size: clamp(32px, 4.5vw, 48px);
    font-weight: 700; letter-spacing: -0.025em; line-height: 1.1;
    margin: 0 0 16px;
  }
  h1 .accent { color: var(--accent); }
  .lede { font-size: 17px; color: var(--text-dim); max-width: 720px; margin: 0 0 28px; }
  .meta {
    display: flex; flex-wrap: wrap; gap: 8px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 12px; color: var(--text-mute);
  }
  .meta span { padding: 4px 10px; background: var(--bg-elev); border: 1px solid var(--line); border-radius: 999px; }

  /* Search + filter */
  .search-section { padding: 28px 0; border-bottom: 1px solid var(--line); position: sticky; top: 60px; background: var(--bg); z-index: 40; }
  .search-row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .search-input {
    flex: 1; min-width: 240px;
    padding: 12px 16px;
    background: var(--bg-elev); border: 1px solid var(--line);
    border-radius: 8px; color: var(--text); font-size: 15px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    outline: none; transition: border-color 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text-mute); }
  .tabs-filter { display: flex; gap: 4px; flex-wrap: wrap; }
  .tab-btn {
    background: transparent; border: 1px solid var(--line);
    color: var(--text-dim); padding: 8px 14px;
    border-radius: 7px; cursor: pointer; font-size: 13px;
    font-weight: 500; transition: all 0.15s;
    font-family: inherit;
  }
  .tab-btn:hover { color: var(--text); border-color: var(--line-strong); }
  .tab-btn.active { background: var(--accent); color: #0b0d10; border-color: var(--accent); }
  @media (prefers-color-scheme: light) {
    .tab-btn.active { color: white; }
  }

  /* Section */
  .section { padding: 48px 0; border-bottom: 1px solid var(--line); }
  .section-title {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase;
    color: var(--text-mute); margin-bottom: 24px;
    display: flex; align-items: center; gap: 12px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--line); }

  /* Command card */
  .cmd-block {
    background: var(--bg-elev);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    margin-bottom: 16px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .cmd-head {
    padding: 16px 20px;
    background: var(--bg-elev-2);
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; justify-content: space-between;
    gap: 12px; flex-wrap: wrap;
  }
  .cmd-name {
    font-size: 18px; font-weight: 600;
    color: var(--accent);
    font-family: "JetBrains Mono", ui-monospace, monospace;
  }
  .cmd-desc { font-size: 13px; color: var(--text-dim); }
  .cmd-list { padding: 8px 0; }
  .cmd-row {
    display: flex; align-items: flex-start; gap: 16px;
    padding: 12px 20px;
    border-bottom: 1px solid var(--line);
    transition: background 0.1s;
  }
  .cmd-row:last-child { border-bottom: none; }
  .cmd-row:hover { background: var(--bg-elev-2); }
  .cmd-syntax {
    flex-shrink: 0;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 13px; color: var(--text);
    background: var(--bg);
    padding: 6px 10px; border-radius: 5px;
    border: 1px solid var(--line);
    min-width: 280px;
    cursor: pointer;
    user-select: all;
  }
  .cmd-syntax::before { content: '$ '; color: var(--accent); }
  .cmd-explain { flex: 1; font-size: 14px; color: var(--text-dim); }
  .copy-btn {
    flex-shrink: 0;
    background: transparent; border: 1px solid var(--line);
    color: var(--text-mute);
    padding: 4px 10px; border-radius: 5px;
    font-size: 12px; cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
  }
  .copy-btn:hover { color: var(--accent); border-color: var(--accent); }
  .copy-btn.copied { color: var(--accent); border-color: var(--accent); }

  /* Empty state */
  .empty { padding: 60px 20px; text-align: center; color: var(--text-mute); }
  .empty h3 { margin: 0 0 8px; color: var(--text-dim); font-weight: 600; }

  /* Footer */
  .foot { padding: 48px 0; color: var(--text-mute); font-size: 13px; }
  .foot-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
  .foot a { color: var(--text-dim); text-decoration: none; border-bottom: 1px dotted var(--line-strong); }
  .foot a:hover { color: var(--accent); }

  /* Responsive */
  @media (max-width: 720px) {
    .cmd-row { flex-direction: column; gap: 8px; }
    .cmd-syntax { min-width: 0; width: 100%; }
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="wrap topbar-inner">
    <div class="brand">
      <span class="brand-dot"></span>
      Hermes CLI <small>// 指令大全</small>
    </div>
    <nav class="topnav">
      <a href="#essential">基本</a>
      <a href="#diagnostics">診斷</a>
      <a href="#model">模型</a>
      <a href="#automation">自動化</a>
      <a href="#data">資料</a>
      <a href="#channels">通道</a>
      <a href="#collab">協作</a>
      <a href="#advanced">進階</a>
    </nav>
  </div>
</header>

<main>
  <section class="hero">
    <div class="wrap">
      <div class="eyebrow">$ hermes --help</div>
      <h1>Hermes Agent <span class="accent">CLI</span> 指令大全</h1>
      <p class="lede">
        在 PowerShell 或 CMD 視窗下最常用的 <code>hermes</code> 指令。
        涵蓋 <strong>80%~90%</strong> 使用情境,跳過極冷僻的開發者指令。
        點擊任一指令可直接複製。
      </p>
      <div class="meta">
        <span>29 個指令</span>
        <span>102 個 subcommand</span>
        <span>Windows / macOS / Linux 通用</span>
        <span>最後更新: 2026-06-06</span>
      </div>
    </div>
  </section>

  <section class="search-section">
    <div class="wrap">
      <div class="search-row">
        <input id="search" class="search-input" type="search" placeholder="搜尋指令 (例如: cron, model, backup)..." autocomplete="off" />
        <div class="tabs-filter">
          <button class="tab-btn active" data-cat="all">全部</button>
          <button class="tab-btn" data-cat="essential">基本</button>
          <button class="tab-btn" data-cat="diagnostics">診斷</button>
          <button class="tab-btn" data-cat="model">模型</button>
          <button class="tab-btn" data-cat="automation">自動化</button>
          <button class="tab-btn" data-cat="data">資料</button>
          <button class="tab-btn" data-cat="channels">通道</button>
          <button class="tab-btn" data-cat="collab">協作</button>
          <button class="tab-btn" data-cat="advanced">進階</button>
        </div>
      </div>
    </div>
  </section>

  <div id="content"></div>
</main>

<footer class="foot">
  <div class="wrap foot-inner">
    <div>Hermes Agent CLI Reference · 2026</div>
    <div>
      <a href="https://hermes-agent.nousresearch.com/docs" target="_blank" rel="noopener">官方文件 ↗</a>
      &nbsp;·&nbsp;
      <a href="https://github.com/hoonsoropenclaw" target="_blank" rel="noopener">Luke0415 ↗</a>
    </div>
  </div>
</footer>

<script src="js/commands.js"></script>
<script>
(function() {
  // 分類對應
  const CATEGORY = {
    'chat': 'essential', 'setup': 'essential', 'version': 'essential',
    'status': 'diagnostics', 'doctor': 'diagnostics', 'logs': 'diagnostics', 'dump': 'diagnostics',
    'model': 'model', 'login': 'model', 'logout': 'model', 'auth': 'model', 'fallback': 'model',
    'cron': 'automation', 'webhook': 'automation', 'send': 'channels',
    'memory': 'data', 'skills': 'data', 'config': 'data', 'backup': 'data', 'import': 'data',
    'dashboard': 'diagnostics', 'insights': 'data', 'security': 'data',
    'kanban': 'collab', 'portal': 'collab', 'pairing': 'collab',
    'curator': 'advanced', 'bundles': 'advanced', 'plugins': 'advanced',
  };

  const CATEGORY_LABEL = {
    'essential': '🚀 基本啟動與設定',
    'diagnostics': '🔍 狀態與診斷',
    'model': '🧠 模型與登入',
    'automation': '⏰ 排程與自動化',
    'data': '💾 資料、技能、備份',
    'channels': '📡 訊息通道',
    'collab': '👥 協作工具',
    'advanced': '⚙️ 進階',
  };

  // 排序: 照分類
  const CAT_ORDER = ['essential', 'diagnostics', 'model', 'automation', 'data', 'channels', 'collab', 'advanced'];

  function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  function render(filter, query) {
    query = (query || '').toLowerCase().trim();
    const content = document.getElementById('content');
    let html = '';

    for (const cat of CAT_ORDER) {
      const cmds = Object.keys(COMMANDS).filter(c => CATEGORY[c] === cat);
      if (cmds.length === 0) continue;

      // 篩選
      const matched = cmds.filter(c => {
        if (filter && filter !== 'all' && CATEGORY[c] !== filter) return false;
        if (!query) return true;
        const data = COMMANDS[c];
        if (c.toLowerCase().includes(query)) return true;
        if (data.desc.toLowerCase().includes(query)) return true;
        return data.subs.some(s => s[0].toLowerCase().includes(query) || s[1].toLowerCase().includes(query));
      });

      if (matched.length === 0) continue;

      html += `<section class="section" id="${cat}">`;
      html += `<div class="wrap">`;
      html += `<div class="section-title">${CATEGORY_LABEL[cat]}</div>`;

      for (const cmd of matched) {
        const data = COMMANDS[cmd];
        html += `<div class="cmd-block" data-cmd="${cmd}">`;
        html += `<div class="cmd-head">`;
        html += `<div><span class="cmd-name">hermes ${cmd}</span> <span class="cmd-desc">— ${escapeHtml(data.desc)}</span></div>`;
        html += `</div>`;
        html += `<div class="cmd-list">`;

        for (const [syntax, explain] of data.subs) {
          html += `<div class="cmd-row">`;
          html += `<code class="cmd-syntax" data-syntax="${escapeHtml(syntax)}" title="點擊複製">${escapeHtml(syntax)}</code>`;
          html += `<div class="cmd-explain">${escapeHtml(explain)}</div>`;
          html += `<button class="copy-btn" data-syntax="${escapeHtml(syntax)}">copy</button>`;
          html += `</div>`;
        }

        html += `</div></div>`;
      }

      html += `</div></section>`;
    }

    if (!html) {
      html = `<div class="wrap"><div class="empty"><h3>找不到符合的指令</h3><p>試試別的關鍵字,或切換到「全部」分類</p></div></div>`;
    }

    content.innerHTML = html;
    bindCopy();
  }

  function bindCopy() {
    document.querySelectorAll('.copy-btn, .cmd-syntax').forEach(el => {
      el.addEventListener('click', async (e) => {
        e.stopPropagation();
        const syntax = el.getAttribute('data-syntax');
        try {
          await navigator.clipboard.writeText(syntax);
          const orig = el.classList.contains('copy-btn') ? el.textContent : null;
          if (orig !== null) {
            el.textContent = '✓ copied';
            el.classList.add('copied');
            setTimeout(() => { el.textContent = 'copy'; el.classList.remove('copied'); }, 1200);
          }
        } catch (err) {
          // fallback
          const ta = document.createElement('textarea');
          ta.value = syntax;
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
      });
    });
  }

  // Filter + search
  let currentCat = 'all';
  document.getElementById('search').addEventListener('input', e => render(currentCat, e.target.value));
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentCat = btn.getAttribute('data-cat');
      render(currentCat, document.getElementById('search').value);
    });
  });

  // Init
  render('all', '');

  // 平滑捲動到 anchor
  document.querySelectorAll('a[href^="#"]').forEach(a => {
    a.addEventListener('click', e => {
      const id = a.getAttribute('href').slice(1);
      const el = document.getElementById(id);
      if (el) {
        e.preventDefault();
        window.scrollTo({ top: el.offsetTop - 110, behavior: 'smooth' });
      }
    });
  });
})();
</script>
</body>
</html>
